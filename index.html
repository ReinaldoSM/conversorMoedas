<!-- // King |Conversion  -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Conversion King</title>
</head>
<body>
    <h1>👑 King Conversion</h1>
    <img class="logo-gif" src="./assets/gif/Yen Japan.gif" alt="Logo-Conversion">
    
    <main>
        <label>
            Converter <b>de</b>:
            <select class="currency-convert-select">
                <option value="Real">R$ Real Brasileiro</option>
                <option value="Dolar">US$ Dólar Americano</option>
                <option value="Euro">€ Euro</option>
                <option value="Libra">£ Libra</option>
                <option value="Bitcoin">₿ Bitcoin</option>

            </select>
    
        </label>

        <label>
            Converter <b>para</b>:
            <select class="currency-select">
                <option value="Dolar">US$ Dólar Americano</option>
                <option value="Euro">€ Euro</option>
                <option value="Libra">£ Libra</option>
                <option value="Real">R$ Real Brasileiro</option>
                <option value="Bitcoin">₿ Bitcoin</option>
            </select>
    
        </label>

        <label>

            Valor:
            <input class="value-input" placeholder="R$10.000,00">
 
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/img/brasil 2.png" alt="logo-moeda-a-converter" class="currency-img-convert">
                <p class="currency-name" id="currency-name-convert">Real</p>
                <p class="currency-value-to-convert">R$0,00</p>
            </div>

            <img src="./assets/img/Seta.png" alt="seta" class="seta">

            <div class="currency-box">
                <img src="./assets/img/estados-unidos (1) 1.png" alt="logo-moeda-convertida" class="currency-img">
                <p class="currency-name" id="currency-name">Dólar Americano</p>
                <p class="currency-value">US$0,00</p>
            </div>
        </section>

    </main>



    <script src="./scripts.js"></script>
</body>
</html>
